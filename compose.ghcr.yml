name: pipedkodi

services:
    web:
        image: ghcr.io/krydix/pipedkodi:${PIPEDKODI_TAG:-latest}
        restart: unless-stopped
        ports:
            - ${HTTP_PORT:-8080}:${HTTP_PORT:-8080}
        environment:
            BACKEND_HOSTNAME: ${BACKEND_HOSTNAME:?set BACKEND_HOSTNAME in .env}
            HTTP_MODE: ${HTTP_MODE:-https}
            HTTP_PORT: ${HTTP_PORT:-8080}
            HTTP_WORKERS: ${HTTP_WORKERS:-}