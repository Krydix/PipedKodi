name: Docker Image Publish

on:
    push:
        paths-ignore:
            - "**.md"
        branches:
            - master
    release:
        types:
            - published
    workflow_dispatch:

permissions:
    contents: write
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-docker-image:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Setup pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: latest
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  cache: "pnpm"
            - run: pnpm install
            - run: pnpm build && ./localizefonts.sh && mv dist/ dist-ci/
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: all
            - name: Set up Docker Buildx
              id: buildx
              uses: docker/setup-buildx-action@v4
              with:
                  version: latest
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.event_name == 'release' }}
                      type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile.ci
                  platforms: linux/amd64,linux/arm64
                  push: true
                  labels: ${{ steps.meta.outputs.labels }}
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            - name: Prepare release assets
              if: github.event_name == 'release'
              run: |
                  mkdir -p release-assets
                  cp compose.ghcr.yml release-assets/compose.yml
                                    cp .env.release.example release-assets/env.example
                  printf '%s\n' "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}" > release-assets/image-tag.txt
                  printf '%s\n' "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" > release-assets/image-digest.txt
            - name: Upload release assets
              if: github.event_name == 'release'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload "${{ github.event.release.tag_name }}" \
                    release-assets/compose.yml \
                                        release-assets/env.example \
                    release-assets/image-tag.txt \
                    release-assets/image-digest.txt \
                    --clobber
